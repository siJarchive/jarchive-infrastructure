services:
  # --- Service Backend ---
  backend:
    build: ./jarchive-backend
    container_name: jarchive-backend
    restart: always
    ports:
      - "${BACKEND_PORT}:5000" 
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - jarchive-network
    volumes:
      - ./jarchive-backend/uploads:/app/uploads

  # --- Service Frontend ---
  frontend:
    build:
      context: ./jarchive-frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: jarchive-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80" 
    depends_on:
      - backend
    networks:
      - jarchive-network

  # --- Service Database ---
  mongo:
    image: mongo:latest
    container_name: jarchive-mongo
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS}
    volumes:
      - mongo-data:/data/db
    networks:
      - jarchive-network

volumes:
  mongo-data:

networks:
  jarchive-network:
    driver: bridge