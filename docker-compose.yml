services:
  backend:
    build: ./jarchive-backend
    container_name: jarchive-backend
    restart: always
    ports:
      - "${BACKEND_PORT}:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo
    networks:
      - jarchive-network
    volumes:
      # Mapping folder upload agar file tidak hilang
      - ./jarchive-backend/uploads:/app/uploads

  frontend:
    build:
      context: ./jarchive-frontend
      args:
        # IP ini disuntik saat build time (Docker)
        - VITE_API_URL=${VITE_API_URL}
    container_name: jarchive-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - jarchive-network

  mongo:
    image: mongo:4.4
    container_name: jarchive-mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - jarchive-network

volumes:
  mongo-data:

networks:
  jarchive-network:
    driver: bridge